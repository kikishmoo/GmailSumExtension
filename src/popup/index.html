<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gmail Summary</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1>Gmail Summary</h1>
      <p id="status">Ready. Open Gmail to activate the content script.</p>

      <section class="category-section" aria-label="Category selection">
        <h2>Track categories</h2>
        <form id="categories-form"></form>
      </section>

      <div class="actions">
        <button id="summarize-button" type="button">Summarize Unread</button>
        <button id="ping-button" type="button">Ping Background</button>
      </div>

      <section class="summary-section" aria-label="Summary output">
        <h2>Latest summary</h2>
        <p id="summary-meta" class="summary-meta">No summary generated yet.</p>
        <ul id="summary-list" class="summary-list"></ul>
      </section>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
